<!DOCTYPE html>
<html lang="fr">
<link rel="manifest" href="manifest.json">
<script>
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Clicker</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: radial-gradient(circle, #1a1a2e, #16213e);
            color: white; font-family: sans-serif; overflow: hidden;
            user-select: none; touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        #counter { font-size: 4rem; font-weight: bold; margin-bottom: 10px; }
        .instruction { opacity: 0.6; font-size: 1rem; }
        .click-effect {
            position: absolute; color: #00d2ff; font-weight: bold;
            pointer-events: none; animation: floatUp 0.6s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-80px); opacity: 0; }
        }
    </style>
</head>
<body onclick="increment(event)">
    <div id="counter">0</div>
    <div class="instruction">Touche l'écran</div>

    <script>
        let count = BigInt(localStorage.getItem('score') || 0);
        const counterElement = document.getElementById('counter');
        counterElement.innerText = count.toString();

        function increment(e) {
            count++;
            counterElement.innerText = count.toString();
            localStorage.setItem('score', count.toString()); // Sauvegarde auto
            createClickEffect(e.clientX || e.touches[0].clientX, e.clientY || e.touches[0].clientY);
        }

        function createClickEffect(x, y) {
            const effect = document.createElement('div');
            effect.className = 'click-effect';
            effect.innerText = '+1';
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 600);
        }
    </script>
</body>
</html>
